<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Parlantia">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-192.png">

    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Parlantia - Colección José Martí</title>
    <meta name="theme-color" content="#1A1A5A">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="assets/lib/fuse.min.js"></script>
</head>

<body>

    <header>
        <img src="assets/logo.png" alt="Parlantia" class="logo">
    </header>

    <div id="toast-container"></div>

    <main id="main-content">
        <section id="view-playlist" class="app-view">
            <div id="playlist-container"></div>
        </section>

        <section id="view-search" class="app-view" style="display: none; padding-top: 15px;">
            <div class="search-bar" style="position: relative; margin-bottom: 25px;">
                <span
                    style="position: absolute; left: 20px; top: 18px; font-size: 1.2rem; pointer-events: none;">🔍</span>
                <input type="text" id="search-input" placeholder="Buscar título o autor..."
                    oninput="handleSearch(event)">
            </div>
            <div id="search-results"></div>
        </section>

        <section id="view-library" class="app-view" style="display: none;">

            <div class="library-controls" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="library-filter" placeholder="Filtrar tus libros..." oninput="renderLibrary()"
                    style="flex: 2; padding: 10px; border-radius: 8px; border: 2px solid #ddd; outline: none; color: var(--brand-blue); background: white;">

                <select id="library-sort" onchange="renderLibrary()"
                    style="flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #ddd; background: white; color: var(--brand-blue); font-weight: bold; font-size: 0.8rem;">
                    <option value="recent_desc">Más nuevos</option>
                    <option value="recent_asc">Más antiguos</option>
                    <option value="title_az">Título A-Z</option>
                    <option value="title_za">Título Z-A</option>
                    <option value="author_az">Autor A-Z</option>
                    <option value="author_za">Autor Z-A</option>
                </select>
            </div>

            <div id="library-grid-container"></div>
            <div id="book-detail-view" style="display:none;"></div>
        </section>

        <section id="view-downloads" class="app-view" style="display: none; padding-top: 15px;">
            <div id="downloads-container">
                <div class="empty-state">
                    <h2 class="empty-title">No hay descargas activas en este momento</h2>
                </div>
            </div>

            <button onclick="clearAudioCache()" class="btn-floating-fixed">
                <span>x</span> Vaciar Caché
            </button>
        </section>
    </main>

    <footer id="custom-player">
        <div class="player-info">
            <span id="track-title" class="track-title-display">Selecciona un audio</span>
        </div>

        <div class="player-controls">
            <div class="timer-wrapper" style="position: relative;">
                <button id="btn-timer" onclick="toggleTimerMenu()" title="Temporizador"
                    style="background: transparent; border: none; padding: 0; margin: 0; cursor: pointer; display: flex; align-items: center;">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#1A1A5A">
                        <path
                            d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" />
                    </svg>
                </button>
                <div id="timer-menu" class="timer-menu-popup" style="display: none;">
                    <div class="timer-option" onclick="setSleepTimer(15)">15 min</div>
                    <div class="timer-option" onclick="setSleepTimer(30)">30 min</div>
                    <div class="timer-option" onclick="setSleepTimer(45)">45 min</div>
                    <div class="timer-option" onclick="setSleepTimer(60)">60 min</div>
                    <div class="timer-option" onclick="setSleepTimer(0)"
                        style="color: #d32f2f; border-top: 1px solid #eee;">Desactivar</div>
                </div>
            </div>
            <button id="btn-speed" onclick="changeSpeed()">1x</button>

            <div class="main-buttons">
                <button id="btn-prev" onclick="playPrevInList()" style="opacity: 0.3;" disabled><svg viewBox="0 0 24 24"
                        fill="#1A1A5A">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6l-8.5 6z" />
                    </svg></button>
                <button onclick="skip(-10)"><svg viewBox="0 0 24 24" fill="#1A1A5A">
                        <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z" />
                    </svg></button>
                <button id="btn-play-pause" onclick="togglePlayPause()">
                    <svg id="icon-play" viewBox="0 0 24 24" fill="#1A1A5A">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" fill="#1A1A5A" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <button onclick="skip(30)"><svg viewBox="0 0 24 24" fill="#1A1A5A">
                        <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" />
                    </svg></button>
                <button id="btn-next" onclick="playNextInList()" style="opacity: 0.3;" disabled><svg viewBox="0 0 24 24"
                        fill="#1A1A5A">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                    </svg></button>
            </div>

            <div class="volume-control" style="display: flex; align-items: center; gap: 5px;">
                <span style="display: flex; align-items: center;">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#1A1A5A">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                </span>
                <input type="range" id="volume-bar" min="0" max="1" step="0.05" value="1" oninput="changeVolume()"
                    style="width: 50px; margin: 0;">
            </div>
        </div>

        <div class="player-progress">
            <span id="time-current">0:00</span>
            <button class="btn-seek-step" onclick="skip(-30)" title="Retroceder 30 segundos">-30s</button>
            <input type="range" id="progress-bar" value="0" min="0" max="100" step="1" oninput="seekAudio()">
            <button class="btn-seek-step" onclick="skip(30)" title="Adelantar 30 segundos">+30s</button>
            <span id="time-total">0:00</span>
        </div>
        <audio id="main-audio"></audio>
    </footer>

    <nav id="bottom-nav">
        <button id="btn-playlist" class="nav-item active" onclick="showTab('playlist')">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                        d="M12 3c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z" />
                </svg>
            </span>
            <span class="nav-text">Mi Lista</span>
        </button>

        <button id="btn-search" class="nav-item" onclick="showTab('search')">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path
                        d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                </svg>
            </span>
            <span class="nav-text">Buscar</span>
        </button>

        <button id="btn-library" class="nav-item" onclick="showTab('library')">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path
                        d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h4v2h-4zm0-6h8v2h-8z" />
                </svg>
            </span>
            <span class="nav-text">Biblioteca</span>
        </button>

        <button id="btn-downloads" class="nav-item" onclick="showTab('downloads')">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
                </svg>
            </span>
            <span class="nav-text">Descargas</span>
        </button>
    </nav>

    <div id="parlantia-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-title">Título</h3>
            <p id="modal-message">Mensaje del modal aquí...</p>
            <div class="modal-actions">
                <button class="btn-modal-secondary" onclick="closeModal()">Cancelar</button>
                <button id="modal-btn-confirm" class="btn-modal-primary">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
